<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Wedding AI Game</title>

<link rel="stylesheet" href="style.css">

<!-- Supabase v2 library (IMPORTANT for realtime channels) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<!-- ============================= -->
<!-- JOIN SCREEN -->
<!-- ============================= -->

<div id="joinScreen">

<h1>Wedding AI Game 🎉</h1>

<!-- Game code -->
<input id="codeInput" placeholder="Game Code">

<!-- Player name -->
<input id="nameInput" placeholder="Your Name">

<!-- Table number -->
<input id="tableInput" placeholder="Table Number">

<br>

<button id="joinBtn">Join Game</button>

</div>



<!-- ============================= -->
<!-- GAME SCREEN -->
<!-- ============================= -->

<div id="gameScreen" style="display:none">

<!-- Scenario text -->
<h2 id="scenario"></h2>

<!-- Countdown timer -->
<div id="timer"></div>

<!-- Player answer -->
<textarea id="answerBox" placeholder="Type your answer"></textarea>

<br>

<button id="submitBtn">Submit Answer</button>

<!-- Status message -->
<div id="statusMsg"></div>

</div>


<!-- ============================= -->
<!-- SCRIPTS -->
<!-- ============================= -->

<!-- Supabase connection -->
<script src="supabase.js"></script>

<!-- Player game logic -->
<script src="player.js"></script>

</body>

</html>
